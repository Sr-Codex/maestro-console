name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        # informativo por enquanto: há linhas longas pré-existentes; vira gate (remover
        # continue-on-error) quando o código estiver 100% limpo.
        continue-on-error: true
        run: ruff check maestro tests
      - name: Testes (pytest)
        run: pytest -q

name = "codex"

[headless]
cmd = ["codex", "exec", "--skip-git-repo-check"]
stdin = "devnull"
output_args = []
# Config/sessão/auth do codex (liberados rw no sandbox).
rw_paths = ["~/.codex", "~/.config/codex"]

# Codex retoma sessão por subcomando (estruturalmente diferente do claude).
[headless.session]
mode = "subcommand"
resume_cmd = ["codex", "exec", "--skip-git-repo-check", "resume", "{id}"]
# Codex gera o proprio session-id e o imprime; capturamos para retomar (V3-S2).
assign = "captured"
capture = "session id: (\\S+)"

# Sandbox workspace-write (ADR-6) — SEM --dangerously-bypass-*. Workspace isolado (E2-S2).
[headless.permissions]
args = ["--sandbox", "workspace-write", "-C", "{workspace}"]
allowed_tools = []

# Auto-aprovação do INTERATIVO. Verificado no binário codex-cli 0.142.4 (2026-07-01):
# --full-auto foi REMOVIDO do interativo; a sandbox interna (Landlock+seccomp) aninhada
# no nosso bwrap tende a quebrar. --dangerously-bypass-approvals-and-sandbox desliga a
# sandbox INTERNA do codex (o bwrap externo já é o confinamento — uso documentado da flag:
# "intended solely for environments that are externally sandboxed").
[interactive]
auto_approve = ["--dangerously-bypass-approvals-and-sandbox"]
